<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Staff Login - APRIL MAY Remuneration Claim Management System">
  <title>Staff Login | Remuneration Claims</title>
  <link rel="stylesheet" href="/css/styles.css?v=8">
  <link rel="stylesheet" href="/css/admin.css?v=8">
</head>
<body>
  <!-- ── Animated Background ──────────────────────────────────────── -->
  <div class="background-mesh">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
  </div>

  <div class="login-page">
    <div class="login-card animate-fade-in">
      <div class="login-header">
        <div class="login-icon">👤</div>
        <h2 class="login-title">Staff Login</h2>
        <p class="login-subtitle">Submit your Remuneration Claims</p>
      </div>

      <div class="login-error" id="loginError"></div>

      <form id="staffLoginForm">
        <div style="margin-bottom: 1.5rem;">
          <input type="text" class="login-input" id="staffId" name="staffId" placeholder="Staff ID (e.g. TRPT...)" required autocomplete="off">
        </div>
        <div style="margin-bottom: 2rem;">
          <input type="password" class="login-input" id="password" name="password" placeholder="Password" required autocomplete="off">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%;margin-top:var(--space-sm);" id="loginBtn">
          <span class="spinner"></span>
          <span class="btn-text">Log In</span>
        </button>
      </form>

      <p style="text-align:center;margin-top:var(--space-lg);font-size:0.9rem;color:var(--text-muted);">
        Don't have an account? <a href="/register" style="color:var(--primary-400);font-weight:600;">Register Here</a>
      </p>
      <p style="text-align:center;margin-top:var(--space-sm);font-size:0.9rem;color:var(--text-muted);">
        Are you an administrator? <a href="/admin" style="color:var(--primary-400);font-weight:600;">Admin Login</a>
      </p>
    </div>
  </div>

  <script src="/js/utils.js?v=8"></script>
  <script src="/js/staff-auth.js?v=8"></script>
</body>
</html>
