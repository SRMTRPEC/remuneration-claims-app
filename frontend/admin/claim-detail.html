<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View and edit remuneration claim details.">
  <title>Claim Details | Admin Panel</title>
  <link rel="stylesheet" href="/css/styles.css?v=14">
  <link rel="stylesheet" href="/css/form.css?v=14">
  <link rel="stylesheet" href="/css/admin.css?v=14">
  <link rel="stylesheet" href="/css/print.css?v=12">
</head>
<body>
  <div class="admin-layout">

    <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

    <!-- ── Sidebar ────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>📋 Claims Admin</h2>
        <div class="sidebar-subtitle">Remuneration System</div>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="sidebar-link">
          <span class="sidebar-link-icon">📊</span> Dashboard
        </a>
        <a href="/admin/claims" class="sidebar-link">
          <span class="sidebar-link-icon">📄</span> All Claims
        </a>
        <a href="/" class="sidebar-link" target="_blank">
          <span class="sidebar-link-icon">📝</span> Claim Form
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user" style="margin-bottom: 1rem;">
          <div class="sidebar-user-avatar" id="userAvatar">A</div>
          <div class="sidebar-user-info">
            <div class="sidebar-user-name" id="userName">Admin</div>
            <div class="sidebar-user-role">Administrator</div>
          </div>
        </div>
        <button class="btn btn-outline" id="logoutBtn" style="width: 100%; border-color: rgba(255,255,255,0.2); color: #fff; justify-content: center;">
          🚪 Log Out
        </button>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────────────────────── -->
    <main class="admin-main">
      <div class="admin-topbar">
        <h1 class="admin-topbar-title" id="pageTitle">Claim Details</h1>
        <div class="admin-topbar-actions">
          <button class="btn btn-sm btn-secondary" id="backToClaimsBtn">← Back to Claims</button>
          <button class="theme-toggle" onclick="toggleDarkMode()" title="Toggle dark mode" style="background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border-color);">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
          </button>
        </div>
      </div>

      <div class="admin-content" id="claimContent">
        <!-- Loading state -->
        <div style="text-align:center;padding:4rem;">
          <div style="font-size:2rem;animation:pulse 1.5s infinite;">📋</div>
          <p style="color:var(--text-muted);margin-top:var(--space-md);">Loading claim details...</p>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
  <script src="/js/utils.js?v=14"></script>
  <script src="/js/claim-detail.js?v=14"></script>
</body>
</html>
